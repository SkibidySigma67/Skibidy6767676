<!DOCTYPE html>
<html>
<head>
    <title>Login - Jack Hartfield Sports Club</title>
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="../static/images/Logo.jpg">
        </div>

        <ul>
            <li><a href="/Home">Home</a></li> 
            <li><a href="/Fitness_Center">Fitness Center</a></li> 
            <li><a href="/Membership">Membership</a></li> 
            <li><a href="/Room_Hire">Room Hire</a></li> 
            <li><a href="/Login" class="active">Login</a></li>
        </ul>
    </nav>

    <section class="login-section">
        <div class="login-box">
            <h1>Member Login</h1>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p class="signup-text">
                Don't have an account?
                <a href="/Create_Account">Create one here</a>
            </p>
        </div>
    </section>

    <footer style="background-color: black; color: white;">
        <p>Made by Jacob at Ghost Innovations LTD</p>
    </footer>

</body>
</html>
